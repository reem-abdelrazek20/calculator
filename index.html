<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Calculator app</title>
  <link rel="stylesheet" href="./css.css">

  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>


  <main>
      <header>
    <div class="top-part">

      <h1>calc</h1>

      <div class="theme">
        <span>THEME</span>

        <div class="theme-control">
          <div class="numbers">
            <span>1</span>
            <span>2</span>
            <span>3</span>
          </div>

          <div class="toggle-btn">
            <div class="toggle-container">
              <div class="toggle-circle"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </header>
    <div class="res">
      <div id="screen"></div>
    </div>

    <section>
   
        <div class="buttons">
  <button>7</button>
  <button>8</button>
  <button>9</button>
  <button class="del">DEL</button>

  <button>4</button>
  <button>5</button>
  <button>6</button>
  <button>+</button>

  <button>1</button>
  <button>2</button>
  <button>3</button>
  <button>-</button>

  <button>.</button>
  <button>0</button>
  <button>/</button>
  <button>x</button>

  <button class="reset">RESET</button>
  <button class="equal">=</button>
</div>


    </section>

  </main>




  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">reem</a>.
  </footer>
  <script src="./js.js"></script>
</body>

</html>
